name: nimbus-cloud-framework-go

services:
  mysql:
    image: mysql:8.4
    container_name: nimbus-cloud-go-mysql
    environment:
      MYSQL_DATABASE: nimbus_cloud_go
      MYSQL_USER: nimbus
      MYSQL_PASSWORD: nimbus_dev
      MYSQL_ROOT_PASSWORD: nimbus_root_dev
      TZ: Asia/Shanghai
    ports:
      - "23326:3306"
    volumes:
      - nimbus-cloud-go-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u nimbus -pnimbus_dev --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  nacos:
    image: docker.m.daocloud.io/nacos/nacos-server:v3.2.3
    container_name: nimbus-cloud-go-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_TOKEN: TXVzZVBsYXRmb3JtTG9jYWxEZXZlbG9wbWVudFRva2VuMjAyNiE=
      NACOS_AUTH_IDENTITY_KEY: nimbus-go
      NACOS_AUTH_IDENTITY_VALUE: nimbus-go-local
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "28858:8848"
      - "29858:9848"
      - "29859:9849"
      - "28090:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/v3/console/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

volumes:
  nimbus-cloud-go-mysql-data:
